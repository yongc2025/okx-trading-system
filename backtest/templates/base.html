<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OKX 量化回测系统{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117; color: #c9d1d9; min-height: 100vh;
        }
        .navbar {
            background: #161b22; border-bottom: 1px solid #30363d;
            padding: 0 24px; display: flex; align-items: center; height: 56px;
            position: sticky; top: 0; z-index: 100;
        }
        .navbar .logo {
            font-size: 18px; font-weight: 700; color: #58a6ff;
            margin-right: 32px; white-space: nowrap;
        }
        .navbar .logo span { color: #f0883e; }
        .nav-links { display: flex; gap: 4px; }
        .nav-links a {
            color: #8b949e; text-decoration: none; padding: 8px 16px;
            border-radius: 6px; font-size: 14px; transition: all 0.2s;
        }
        .nav-links a:hover { color: #c9d1d9; background: #21262d; }
        .nav-links a.active { color: #fff; background: #1f6feb; }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .card {
            background: #161b22; border: 1px solid #30363d; border-radius: 8px;
            padding: 20px; margin-bottom: 20px;
        }
        .card h2 {
            font-size: 16px; color: #8b949e; margin-bottom: 16px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 24px;
        }
        .stat-card {
            background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
            padding: 16px; text-align: center;
        }
        .stat-card .label { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card .sub { font-size: 12px; color: #8b949e; margin-top: 4px; }
        .positive { color: #3fb950; }
        .negative { color: #f85149; }
        .neutral { color: #58a6ff; }

        .chart-container {
            width: 100%; height: 400px; margin: 16px 0;
        }
        .chart-container.small { height: 300px; }

        table {
            width: 100%; border-collapse: collapse; font-size: 14px;
        }
        th {
            background: #0d1117; color: #8b949e; padding: 10px 12px;
            text-align: left; border-bottom: 1px solid #30363d;
            font-weight: 600; position: sticky; top: 0;
        }
        td {
            padding: 8px 12px; border-bottom: 1px solid #21262d;
        }
        tr:hover td { background: #161b22; }

        .btn {
            padding: 8px 16px; border-radius: 6px; border: 1px solid #30363d;
            background: #21262d; color: #c9d1d9; cursor: pointer;
            font-size: 14px; transition: all 0.2s;
        }
        .btn:hover { background: #30363d; }
        .btn-primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
        .btn-primary:hover { background: #388bfd; }
        .btn-danger { background: #da3633; border-color: #da3633; color: #fff; }

        .filters { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        .filters select, .filters input {
            padding: 6px 12px; border-radius: 6px; border: 1px solid #30363d;
            background: #0d1117; color: #c9d1d9; font-size: 14px;
        }

        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 12px;
            font-size: 12px; font-weight: 600;
        }
        .badge-green { background: #0d4429; color: #3fb950; }
        .badge-red { background: #490202; color: #f85149; }
        .badge-blue { background: #0c2d6b; color: #58a6ff; }

        .loading { text-align: center; padding: 40px; color: #8b949e; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

        .table-scroll { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">OKX <span>回测系统</span></div>
        <div class="nav-links">
            <a href="/" class="{% if active == 'index' %}active{% endif %}">📊 统计看板</a>
            <a href="/data" class="{% if active == 'data' %}active{% endif %}">📥 数据管理</a>
            <a href="/orders" class="{% if active == 'orders' %}active{% endif %}">📋 订单分析</a>
            <a href="/hold-loss" class="{% if active == 'hold_loss' %}active{% endif %}">⚠️ 扛单分析</a>
            <a href="/stoploss" class="{% if active == 'stoploss' %}active{% endif %}">🛡️ 止损回测</a>
            <a href="/position" class="{% if active == 'position' %}active{% endif %}">📈 仓位分析</a>
            <a href="/scan" class="{% if active == 'scan' %}active{% endif %}">⚡ 极端行情</a>
            <a href="/simulate" class="{% if active == 'simulate' %}active{% endif %}">🧪 模拟回测</a>
            <a href="/optimize" class="{% if active == 'optimize' %}active{% endif %}">⚙️ 参数优化</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
