<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}OKX 量化回测系统{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0d1117;
        color: #c9d1d9;
        min-height: 100vh;
      }
      .navbar {
        background: #161b22;
        border-bottom: 1px solid #30363d;
        padding: 0 24px;
        display: flex;
        align-items: center;
        height: 56px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .navbar .logo {
        font-size: 18px;
        font-weight: 700;
        color: #58a6ff;
        margin-right: 32px;
        white-space: nowrap;
      }
      .navbar .logo span {
        color: #f0883e;
      }
      .nav-links {
        display: flex;
        gap: 4px;
      }
      .nav-links a {
        color: #8b949e;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 14px;
        transition: all 0.2s;
      }
      .nav-links a:hover {
        color: #c9d1d9;
        background: #21262d;
      }
      .nav-links a.active {
        color: #fff;
        background: #1f6feb;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px;
      }

      .card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .card h2 {
        font-size: 16px;
        color: #8b949e;
        margin-bottom: 16px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .stat-card {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 16px;
        text-align: center;
      }
      .stat-card .label {
        font-size: 12px;
        color: #8b949e;
        margin-bottom: 4px;
      }
      .stat-card .value {
        font-size: 28px;
        font-weight: 700;
      }
      .stat-card .sub {
        font-size: 12px;
        color: #8b949e;
        margin-top: 4px;
      }
      .positive {
        color: #3fb950;
      }
      .negative {
        color: #f85149;
      }
      .neutral {
        color: #58a6ff;
      }

      .chart-container {
        width: 100%;
        height: 400px;
        margin: 16px 0;
      }
      .chart-container.small {
        height: 300px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th {
        background: #0d1117;
        color: #8b949e;
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid #30363d;
        font-weight: 600;
        position: sticky;
        top: 0;
      }
      td {
        padding: 8px 12px;
        border-bottom: 1px solid #21262d;
      }
      tr:hover td {
        background: #161b22;
      }

      .btn {
        padding: 8px 16px;
        border-radius: 6px;
        border: 1px solid #30363d;
        background: #21262d;
        color: #c9d1d9;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }
      .btn:hover {
        background: #30363d;
      }
      .btn:active {
        transform: scale(0.97);
        filter: brightness(0.85);
      }
      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        pointer-events: none;
      }
      .btn-primary {
        background: #1f6feb;
        border-color: #1f6feb;
        color: #fff;
      }
      .btn-primary:hover {
        background: #388bfd;
      }
      .btn-primary:active {
        background: #1158c7;
        transform: scale(0.97);
      }
      .btn-primary:disabled {
        background: #1f6feb;
        opacity: 0.45;
        cursor: not-allowed;
        pointer-events: none;
      }
      .btn-danger {
        background: #da3633;
        border-color: #da3633;
        color: #fff;
      }
      .btn-danger:hover {
        background: #f85149;
      }
      .btn-danger:active {
        background: #b62324;
        transform: scale(0.97);
      }
      .btn-danger:disabled {
        background: #da3633;
        opacity: 0.45;
        cursor: not-allowed;
        pointer-events: none;
      }

      .filters {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .filters select,
      .filters input {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid #30363d;
        background: #0d1117;
        color: #c9d1d9;
        font-size: 14px;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
      }
      .badge-green {
        background: #0d4429;
        color: #3fb950;
      }
      .badge-red {
        background: #490202;
        color: #f85149;
      }
      .badge-blue {
        background: #0c2d6b;
        color: #58a6ff;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: #8b949e;
      }
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      @media (max-width: 768px) {
        .two-col {
          grid-template-columns: 1fr;
        }
      }

      .table-scroll {
        max-height: 500px;
        overflow-y: auto;
      }

      /* 全局账户选择器 */
      .global-account-selector {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .global-account-selector select {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid #30363d;
        background: #0d1117;
        color: #c9d1d9;
        font-size: 13px;
        height: 34px;
        cursor: pointer;
        min-width: 150px;
      }
      .global-account-selector select:focus {
        border-color: #58a6ff;
        outline: none;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">OKX <span>回测系统</span></div>
      <div class="nav-links">
        <a href="/data" class="{% if active == 'data' %}active{% endif %}"
          >📥 数据管理</a
        >
        <a href="/orders" class="{% if active == 'orders' %}active{% endif %}"
          >📋 订单分析</a
        >
        <a href="/" class="{% if active == 'index' %}active{% endif %}"
          >📊 统计看板</a
        >
        <a
          href="/hold-loss"
          class="{% if active == 'hold_loss' %}active{% endif %}"
          >⚠️ 扛单分析</a
        >
        <a
          href="/stoploss"
          class="{% if active == 'stoploss' %}active{% endif %}"
          >🛡️ 止损回测</a
        >
        <a
          href="/position"
          class="{% if active == 'position' %}active{% endif %}"
          >📈 仓位分析</a
        >
        <a href="/scan" class="{% if active == 'scan' %}active{% endif %}"
          >⚡ 极端行情</a
        >
        <a
          href="/simulate"
          class="{% if active == 'simulate' %}active{% endif %}"
          >🧪 模拟回测</a
        >
        <a
          href="/optimize"
          class="{% if active == 'optimize' %}active{% endif %}"
          >⚙️ 参数优化</a
        >
      </div>
      <!-- 全局账户选择器 -->
      <div class="global-account-selector" id="global-account-selector">
        <select
          id="global-account-select"
          onchange="onGlobalAccountChange(this.value)"
        >
          <option value="">全部账户</option>
        </select>
      </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
    <!-- Toast 通知 -->
    <div
      id="toast-container"
      style="
        position: fixed;
        top: 70px;
        right: 24px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
      "
    ></div>
    <script>
      function showToast(msg, type = "success") {
        const colors = {
          success: "#3fb950",
          error: "#f85149",
          info: "#58a6ff",
        };
        const bg = { success: "#0d4429", error: "#490202", info: "#0c2d6b" };
        const el = document.createElement("div");
        el.style.cssText = `padding:12px 20px;border-radius:8px;color:${colors[type] || colors.info};background:${bg[type] || bg.info};border:1px solid ${colors[type] || colors.info};font-size:14px;opacity:0;transition:opacity 0.3s;`;
        el.textContent = msg;
        document.getElementById("toast-container").appendChild(el);
        requestAnimationFrame(() => (el.style.opacity = "1"));
        setTimeout(() => {
          el.style.opacity = "0";
          setTimeout(() => el.remove(), 300);
        }, 4000);
      }

      // ===== 全局账户选择器 =====
      // 当前选中的账户 ID（从 localStorage 恢复）
      let currentAccountId = localStorage.getItem("selected_account_id") || "";

      async function loadAccountSelector() {
        try {
          const resp = await fetch("/api/accounts");
          const accounts = await resp.json();
          const sel = document.getElementById("global-account-select");
          if (!sel) return;

          // 保留"全部账户"选项
          sel.innerHTML = '<option value="">全部账户</option>';
          if (Array.isArray(accounts)) {
            accounts.forEach((acc) => {
              const opt = document.createElement("option");
              opt.value = acc.account_id;
              const envLabel = acc.is_demo ? "模拟" : "实盘";
              opt.textContent = `${acc.account_name} (${envLabel})`;
              sel.appendChild(opt);
            });
          }

          // 恢复上次选择
          if (currentAccountId) {
            // 验证账户是否还存在
            const exists = accounts.some(
              (a) => a.account_id === currentAccountId,
            );
            if (exists) {
              sel.value = currentAccountId;
            } else {
              // 账户已删除，重置
              currentAccountId = "";
              localStorage.removeItem("selected_account_id");
            }
          }

          // 触发回调，让页面知道账户已加载完毕
          if (typeof onAccountSelectorReady === "function") {
            onAccountSelectorReady();
          }
        } catch (e) {
          console.error("加载账户列表失败:", e);
        }
      }

      function onGlobalAccountChange(value) {
        currentAccountId = value;
        if (value) {
          localStorage.setItem("selected_account_id", value);
        } else {
          localStorage.removeItem("selected_account_id");
        }
        // 触发页面自定义回调
        if (typeof onAccountChange === "function") {
          onAccountChange(value);
        }
      }

      // 构建带 account_id 的查询参数
      function accountQuery() {
        return currentAccountId ? `?account_id=${currentAccountId}` : "";
      }

      // 构建带 account_id 的 fetch options
      function accountFetchOptions(method, body) {
        const opts = {
          method: method || "GET",
          headers: { "Content-Type": "application/json" },
        };
        if (body) {
          opts.body = JSON.stringify(body);
        }
        return opts;
      }

      // 页面加载时自动初始化账户选择器
      document.addEventListener("DOMContentLoaded", loadAccountSelector);
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
