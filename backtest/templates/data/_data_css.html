<style>
  /* ===== Tab 切换 ===== */
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid #30363d;
    margin-bottom: 16px;
  }
  .tab-btn {
    padding: 10px 20px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: #8b949e;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn:hover {
    color: #c9d1d9;
    background: rgba(88, 166, 255, 0.05);
  }
  .tab-btn.active {
    color: #58a6ff;
    border-bottom-color: #58a6ff;
  }
  .tab-panel {
    display: none;
  }
  .tab-panel.active {
    display: block;
  }

  .api-collapse {
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
  }
  .api-collapse-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 12px 16px;
    background: #161b22;
    border: none;
    color: #c9d1d9;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .api-collapse-toggle:hover {
    background: #1c2129;
  }
  #api-toggle-icon {
    font-size: 11px;
    transition: transform 0.2s;
    display: inline-block;
  }
  .api-collapse.open #api-toggle-icon {
    transform: rotate(90deg);
  }
  .api-collapse-body {
    display: none;
    padding: 16px;
    border-top: 1px solid #30363d;
    background: #0d1117;
  }
  .api-collapse.open .api-collapse-body {
    display: block;
  }
  .api-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #f85149;
    color: #fff;
    margin-left: auto;
  }
  .api-badge.ok {
    background: #3fb950;
  }

  /* ===== API 配置表单 ===== */
  .api-form {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
  }
  .api-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 200px;
  }
  .api-field.short {
    flex: 0 0 200px;
    min-width: 160px;
  }
  .api-field.inline {
    flex: 0 0 auto;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    padding-top: 22px;
  }
  .api-field label {
    font-size: 13px;
    color: #8b949e;
  }
  .api-field.inline label {
    font-size: 14px;
  }
  .api-field input[type="text"],
  .api-field input[type="password"] {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 14px;
    height: 36px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-field input:focus {
    border-color: #58a6ff;
  }
  #conn-status {
    font-size: 13px;
    margin-left: 4px;
  }

  /* ===== 币种选择器 ===== */
  .symbol-selector-wrap {
    position: relative;
  }
  .symbol-input-row {
    position: relative;
  }
  .symbol-input-row input {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 14px;
    height: 36px;
    outline: none;
    transition: border-color 0.2s;
  }
  .symbol-input-row input:focus {
    border-color: #58a6ff;
  }

  .symbol-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;

    background: #161b22;

    border-radius: 0 0 6px 6px;

    overflow-y: auto;
    z-index: 200;

    display: block;
  }

  .symbol-option {
    display: flex;

    flex-shrink: 0;

    opacity: 1;
  }
  .symbol-option .sym-name {
    flex: 1;
  }
  .symbol-option .sym-badge {

    border: 1px solid #d29922;
    color: #e3b341;
  }
  .symbol-tag .star {
    font-size: 13px;
  }
  .symbol-tag .remove {
    font-size: 14px;
    color: #8b949e;
    cursor: pointer;
    margin-left: 2px;
    line-height: 1;
  }
  .symbol-tag .remove:hover {
    color: #f85149;
  }

  .bar-chip {

    background: #0d1117;
    border: 1px solid #30363d;
    font-size: 14px;
    color: #8b949e;
    transition: all 0.2s;
    user-select: none;
  }
  .bar-chip:has(input:checked) {
    border-color: #1f6feb;
    color: #58a6ff;
    background: #0c2d6b;
  }
  .bar-chip input {
    display: none;
  }

  /* ===== 日期/天数 ===== */
  .radio-label {
    color: #8b949e;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 4px;

  .days-input {

    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 14px;
    height: 32px;
    text-align: center;
  }
  .date-fields {
    display: none;
    gap: 8px;
    align-items: center;
  }

    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 14px;
    height: 32px;
  }

  #order-inst-type {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 13px;
    height: 34px;
  }
